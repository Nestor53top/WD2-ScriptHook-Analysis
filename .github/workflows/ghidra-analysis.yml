name: Ghidra Analysis

on:
  workflow_dispatch:
  push:
    paths:
      - 'binaries/**'
      - 'scripts/**'

jobs:
  analyze:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Download Ghidra
        run: |
          GHIDRA_URL="https://github.com/NationalSecurityAgency/ghidra/releases/download/Ghidra_12.1.2_build/ghidra_12.1.2_PUBLIC_20260605.zip"
          echo "Downloading Ghidra..."
          curl -L -o ghidra.zip "$GHIDRA_URL"
          echo "Extracting Ghidra..."
          unzip -q ghidra.zip -d /opt
          GHIDRA_DIR=$(ls -d /opt/ghidra_* | head -1)
          echo "Ghidra installed to: $GHIDRA_DIR"
          echo "GHIDRA_DIR=$GHIDRA_DIR" >> $GITHUB_ENV

      - name: Analyze core.dll with Ghidra
        run: |
          export JAVA_HOME="$JAVA_HOME_21_X64"
          GHIDRA_ANALYZE="$GHIDRA_DIR/support/analyzeHeadless"
          
          mkdir -p analysis_project
          
          echo "=== Analyzing core.dll (may take several minutes) ==="
          "$GHIDRA_ANALYZE" analysis_project WD2CoreAnalysis \
            -import binaries/core.dll \
            -processor "x86:LE:64:default" \
            -cspec "windows" \
            -analysisTimeoutPerFile 300
          
          echo "=== Analysis complete ==="
          ls -la analysis_project/

      - name: Export function list
        run: |
          export JAVA_HOME="$JAVA_HOME_21_X64"
          GHIDRA_ANALYZE="$GHIDRA_DIR/support/analyzeHeadless"
          
          echo "=== Exporting functions ==="
          "$GHIDRA_ANALYZE" analysis_project WD2CoreAnalysis \
            -readOnly \
            -postScript ExportFunctions.py \
            -scriptPath scripts

      - name: Export strings
        run: |
          export JAVA_HOME="$JAVA_HOME_21_X64"
          GHIDRA_ANALYZE="$GHIDRA_DIR/support/analyzeHeadless"
          
          echo "=== Exporting strings ==="
          "$GHIDRA_ANALYZE" analysis_project WD2CoreAnalysis \
            -readOnly \
            -postScript ExportStrings.py \
            -scriptPath scripts

      - name: Export imports/exports
        run: |
          export JAVA_HOME="$JAVA_HOME_21_X64"
          GHIDRA_ANALYZE="$GHIDRA_DIR/support/analyzeHeadless"
          
          echo "=== Exporting imports/exports ==="
          "$GHIDRA_ANALYZE" analysis_project WD2CoreAnalysis \
            -readOnly \
            -postScript ExportImportsExports.py \
            -scriptPath scripts

      - name: Export strings
        run: |
          export JAVA_HOME="$JAVA_HOME_21_X64"
          GHIDRA_ANALYZE="$GHIDRA_DIR/support/analyzeHeadless"
          
          echo "=== Exporting strings ==="
          "$GHIDRA_ANALYZE" analysis_project WD2CoreAnalysis \
            -readOnly \
            -postScript ExportStrings.java \
            -scriptPath scripts

      - name: Export imports/exports
        run: |
          export JAVA_HOME="$JAVA_HOME_21_X64"
          GHIDRA_ANALYZE="$GHIDRA_DIR/support/analyzeHeadless"
          
          echo "=== Exporting imports/exports ==="
          "$GHIDRA_ANALYZE" analysis_project WD2CoreAnalysis \
            -readOnly \
            -postScript ExportImportsExports.java \
            -scriptPath scripts

      - name: Collect outputs
        run: |
          echo "=== Collecting analysis outputs ==="
          find . -name "*.csv" -o -name "*.txt" | head -30
          echo "=== Done ==="

      - name: Upload analysis results
        uses: actions/upload-artifact@v4
        with:
          name: ghidra-analysis-core-dll
          path: |
            analysis_project/
            *.csv
            *.txt
          retention-days: 30

      - name: Print summary
        run: |
          echo "=== Analysis Summary ==="
          echo "Files generated:"
          find . -name "*.csv" -o -name "*.txt" | while read f; do
            echo "  - $(basename $f) ($(wc -c < $f) bytes)"
          done
